    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    :root{--black:#0a0a0a;--white:#f5f4f0;--border:rgba(10,10,10,0.1);--font:'Google Sans',sans-serif;}

    .cursor.grow{width:32px;height:32px;background:transparent;border:1.5px solid var(--black);}

    /* NAV */
    nav{position:fixed;top:0;left:0;right:0;z-index:100;display:grid;grid-template-columns:1fr auto 1fr;align-items:start;padding:24px 36px;}
    .nav-logo{display:flex;flex-direction:column;text-decoration:none;color:var(--black);justify-self:start;}
    .nav-logo-name{font-size:13px;font-weight:400;letter-spacing:-0.01em;line-height:1.3;}
    .nav-logo-title{font-size:11px;font-weight:400;opacity:.4;margin-top:1px;}
    .nav-pill{display:flex;align-items:center;background:rgba(245,244,240,.9);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:0.5px solid rgba(10,10,10,.12);border-radius:100px;padding:5px;gap:2px;justify-self:center;}
    .nav-pill-link{font-size:12.5px;font-weight:400;color:var(--black);text-decoration:none;opacity:.45;padding:7px 16px;border-radius:100px;transition:opacity .2s,background .2s;display:flex;align-items:center;gap:3px;white-space:nowrap;}
    .nav-pill-link sup{font-size:8px;opacity:.7;vertical-align:super;}
    .nav-pill-link:hover{opacity:1;background:rgba(10,10,10,.06);}
    .nav-cta-wrap{display:flex;align-items:center;justify-self:end;}
    .nav-cta{font-size:13px;font-weight:400;color:var(--black);text-decoration:none;display:flex;align-items:center;gap:8px;opacity:.7;transition:opacity .2s;}
    .nav-cta:hover{opacity:1;}
    .nav-cta-dot{width:7px;height:7px;border-radius:50%;background:#22c55e;flex-shrink:0;animation:pulse 2.5s ease-in-out infinite;}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

    /* HERO */
    .cs-hero{padding:140px 48px 80px;border-bottom:0.5px solid var(--border);}
    .cs-back{display:inline-flex;align-items:center;gap:8px;font-size:12px;font-weight:400;color:var(--black);text-decoration:none;opacity:.4;letter-spacing:.05em;text-transform:uppercase;margin-bottom:40px;transition:opacity .2s;}
    .cs-back:hover{opacity:.8;}
    .cs-meta-row{display:flex;gap:48px;margin-bottom:28px;flex-wrap:wrap;}
    .cs-meta-group{}
    .cs-meta-label{font-size:10px;font-weight:400;letter-spacing:.12em;text-transform:uppercase;opacity:.3;margin-bottom:6px;}
    .cs-meta-value{font-size:13px;font-weight:400;opacity:.7;line-height:1.5;}
    .cs-title{font-size:clamp(36px,5.5vw,80px);font-weight:400;letter-spacing:-.035em;line-height:1.06;margin-bottom:32px;max-width:900px;}
    .cs-subtitle{font-size:16px;font-weight:400;opacity:.55;line-height:1.75;max-width:680px;}

    /* COVER IMAGE */
    .cs-cover{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;}
    .cs-cover-wrap{overflow:hidden;}

    /* CONTENT */
    .cs-content{max-width:780px;margin:0 auto;padding:80px 48px;}
    .cs-section{margin-bottom:72px;}
    .cs-section-label{font-size:10px;font-weight:400;letter-spacing:.14em;text-transform:uppercase;opacity:.3;margin-bottom:20px;}
    .cs-section-title{font-size:clamp(22px,3vw,38px);font-weight:400;letter-spacing:-.025em;line-height:1.2;margin-bottom:24px;}
    .cs-body{font-size:15px;font-weight:400;opacity:.6;line-height:1.85;}
    .cs-body p+p{margin-top:18px;}
    .cs-body strong{font-weight:500;opacity:1;color:var(--black);}

    /* STATS ROW */
    .cs-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);border:0.5px solid var(--border);margin:48px 0;}
    .cs-stat{background:var(--white);padding:32px 28px;}
    .cs-stat-num{font-size:clamp(28px,4vw,52px);font-weight:400;letter-spacing:-.03em;line-height:1;margin-bottom:10px;}
    .cs-stat-label{font-size:12px;font-weight:400;opacity:.4;line-height:1.5;}

    /* IMAGE */
    .cs-img{width:100%;border-radius:4px;display:block;margin:40px 0;}
    .cs-img-caption{font-size:11px;font-weight:400;opacity:.3;letter-spacing:.04em;margin-top:-32px;margin-bottom:40px;}

    /* LIST */
    .cs-list{list-style:none;margin:20px 0;}
    .cs-list li{display:flex;gap:16px;padding:16px 0;border-top:0.5px solid var(--border);font-size:14px;font-weight:400;opacity:.65;line-height:1.6;}
    .cs-list li:last-child{border-bottom:0.5px solid var(--border);}
    .cs-list-num{font-size:11px;font-weight:400;opacity:.3;font-variant-numeric:tabular-nums;flex-shrink:0;margin-top:2px;}

    /* DIVIDER */
    .cs-divider{height:0.5px;background:var(--border);margin:64px 0;}

    /* NEXT PROJECT */
    .cs-next{display:block;text-decoration:none;color:var(--black);padding:64px 48px;border-top:0.5px solid var(--border);display:flex;justify-content:space-between;align-items:center;transition:opacity .2s;}
    .cs-next:hover{opacity:.6;}
    .cs-next-label{font-size:11px;font-weight:400;letter-spacing:.12em;text-transform:uppercase;opacity:.3;margin-bottom:10px;}
    .cs-next-title{font-size:clamp(20px,3vw,36px);font-weight:400;letter-spacing:-.02em;}
    .cs-next-arrow{font-size:32px;opacity:.3;}

    /* FOOTER */
    footer{border-top:0.5px solid var(--border);padding:24px 48px;display:flex;justify-content:space-between;align-items:center;}
    .footer-copy{font-size:11.5px;font-weight:400;opacity:.25;}
    .footer-back{font-size:11.5px;font-weight:400;opacity:.35;text-decoration:none;color:var(--black);transition:opacity .2s;}
    .footer-back:hover{opacity:.7;}

    /* ANIM */
    .reveal{opacity:0;transform:translateY(20px);animation:revUp .8s cubic-bezier(.22,1,.36,1) forwards;}
    @keyframes revUp{to{opacity:1;transform:translateY(0);}}

    @media(max-width:900px){
      nav{padding:16px 20px;grid-template-columns:1fr auto;}
      .nav-cta-wrap{display:none;}
      .cs-hero,.cs-content{padding-left:24px;padding-right:24px;}
      .cs-stats{grid-template-columns:1fr 1fr;}
      .cs-next{padding:40px 24px;}
      footer{padding:20px 24px;}

const cursor=document.getElementById('cursor');
document.addEventListener('mousemove',e=>{cursor.style.left=e.clientX+'px';cursor.style.top=e.clientY+'px';});
document.querySelectorAll('a,button').forEach(el=>{

  el.addEventListener('mouseleave',()=>cursor.classList.remove('grow'));
});

function renderProject(id){
  const p = PROJECTS[id];
  if(!p){ document.getElementById('cs-root').innerHTML='<p style="padding:200px 48px;opacity:.4;">Project not found.</p>'; return; }

  document.title = p.title + ' — Shafi';

  let statsHTML = p.stats.map(s=>`<div class="cs-stat"><div class="cs-stat-num">${s.num}</div><div class="cs-stat-label">${s.label}</div></div>`).join('');

  let sectionsHTML = p.sections.map(s=>{
    if(s.images){
      return s.images.map(img=>`<img class="cs-img" src="${img}" alt="" loading="lazy" />`).join('');
    }
    let listHTML = s.list ? `<ul class="cs-list">${s.list.map((item,i)=>`<li><span class="cs-list-num">0${i+1}</span>${item}</li>`).join('')}</ul>` : '';
    return `
      <div class="cs-section">
        ${s.label?`<p class="cs-section-label">${s.label}</p>`:''}
        ${s.title?`<h2 class="cs-section-title">${s.title}</h2>`:''}
        ${s.body?`<div class="cs-body"><p>${s.body}</p></div>`:''}
        ${listHTML}
      </div>`;
  }).join('');

  const nextP = PROJECTS[p.next.id];
  const nextThumb = nextP ? nextP.cover : '';

  document.getElementById('cs-root').innerHTML = `
    <div class="cs-hero reveal">
      <a class="cs-back" href="index.html">← All work</a>
      <div class="cs-meta-row">
        <div class="cs-meta-group"><div class="cs-meta-label">Client</div><div class="cs-meta-value">${p.client}</div></div>
        <div class="cs-meta-group"><div class="cs-meta-label">Role</div><div class="cs-meta-value">${p.role}</div></div>
        <div class="cs-meta-group"><div class="cs-meta-label">Year</div><div class="cs-meta-value">${p.year}</div></div>
        <div class="cs-meta-group"><div class="cs-meta-label">Platform</div><div class="cs-meta-value">${p.platform}</div></div>
      </div>
      <h1 class="cs-title">${p.title}</h1>
      <p class="cs-subtitle">${p.subtitle}</p>
    </div>
    <div class="cs-cover-wrap">
      <img class="cs-cover" src="${p.cover}" alt="${p.title}" />
    </div>
    <div class="cs-content">
      <div class="cs-stats">${statsHTML}</div>
      ${sectionsHTML}
    </div>
    <a class="cs-next" href="case-study.html?id=${p.next.id}">
      <div><div class="cs-next-label">Next project</div><div class="cs-next-title">${p.next.title}</div></div>
      <span class="cs-next-arrow">→</span>
    </a>`;

  // re-bind cursor for new links
  document.querySelectorAll('a,button').forEach(el=>{
    el.addEventListener('mouseenter',()=>cursor.classList.add('grow'));
    el.addEventListener('mouseleave',()=>cursor.classList.remove('grow'));
  });
}

const id = new URLSearchParams(window.location.search).get('id') || 'quotations';
renderProject(id);
</script>
</body>
</html>
